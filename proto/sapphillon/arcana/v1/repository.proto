// Defines the repository index schema for the Arcana plugin registry.
// The index is a signed manifest listing all available packages and their versions.

syntax = "proto3";

package sapphillon.arcana.v1;

import "sapphillon/v1/permission.proto";

// The root structure of the repository index.
//
// Fields:
// - api_version: The API version of the index schema.
// - repository: The repository metadata.
// - packages: The list of package metadata entries in this repository.
//
// Example:
// ```proto
//   IndexCore {
//     api_version: "v1"
//     repository: { name: "official", description: "Official Sapphillon registry", public_key: "..." }
//     packages: [{ id: "my-plugin", name: "My Plugin", ... }]
//   }
// ```
message IndexCore {
  // The API version of the index schema.
  string api_version = 1;

  // The repository metadata.
  RepositoryMeta repository = 2;

  // The list of package metadata entries in this repository.
  // Behavior: Must be sorted in ascending lexicographic order by the `id` field
  // before serialization.
  repeated PackageMeta packages = 3;
}

// The metadata describing the repository itself.
//
// Fields:
// - name: The name of the repository.
// - description: The description of the repository.
// - public_key: The Minisign public key used to verify the repository index signature.
//
// Example:
// ```proto
//   RepositoryMeta {
//     name: "official"
//     description: "Official Sapphillon plugin registry"
//     public_key: "RWT..."
//   }
// ```
message RepositoryMeta {
  // The name of the repository.
  string name = 1;

  // The description of the repository.
  string description = 2;

  // The Minisign public key used to verify the repository index signature.
  string public_key = 3;
}

// The function-level permission requirements for a specific version of a package.
//
// Fields:
// - function_name: The name of the function.
// - permissions: The permissions required to execute this function.
//
// Example:
// ```proto
//   FunctionPermissionMeta {
//     function_name: "sendNotification"
//     permissions: [FILESYSTEM_READ, NET]
//   }
// ```
message FunctionPermissionMeta {
  // The name of the function.
  string function_name = 1;

  // The permissions required to execute this function.
  repeated sapphillon.v1.Permission permissions = 2;
}

// The metadata for an individual package in the repository.
//
// Fields:
// - id: The stable unique identifier of the package.
// - name: The human-readable name of the package.
// - author_id: The identifier of the author (e.g., GitHub ID).
// - description: The description of the package.
// - author_public_key: The Minisign public key of the author.
// - versions: The list of available versions for this package.
// - deprecated: Whether the package is deprecated.
//
// Example:
// ```proto
//   PackageMeta {
//     id: "my-plugin"
//     name: "My Plugin"
//     author_id: "alice"
//     description: "Provides useful functionality"
//     author_public_key: "RWT..."
//     versions: [{ version: "1.0.0", url: "https://...", ... }]
//     deprecated: false
//   }
// ```
message PackageMeta {
  // The stable unique identifier of the package.
  string id = 1;

  // The human-readable name of the package.
  string name = 2;

  // The identifier of the author (e.g., GitHub ID).
  string author_id = 3;

  // The description of the package.
  string description = 4;

  // The Minisign public key of the author.
  string author_public_key = 5;

  // The list of available versions for this package.
  // Behavior: Must be sorted in ascending SemVer order by the `version` field
  // before serialization.
  repeated VersionMeta versions = 6;

  // Whether the package is deprecated.
  bool deprecated = 7;
}

// The metadata for an individual version of a package.
//
// Fields:
// - version: The SemVer version string.
// - url: The download URL for `package.js`.
// - signature_url: The URL of the signature file.
// - hash: The SHA-256 hash of the `package.js` file.
// - function_permissions: The function-level permission requirements for this version.
// - yanked: Whether this version has been yanked.
// - yank_reason: The reason for the yank (only meaningful when `yanked` is true).
//
// Example:
// ```proto
//   VersionMeta {
//     version: "1.0.0"
//     url: "https://registry.example.com/packages/my-plugin/1.0.0/package.js"
//     signature_url: "https://registry.example.com/packages/my-plugin/1.0.0/package.js.minisig"
//     hash: "a1b2c3d4..."
//     function_permissions: [{ function_name: "sendNotification", permissions: [NET] }]
//     yanked: false
//     yank_reason: ""
//   }
// ```
message VersionMeta {
  // The SemVer version string.
  string version = 1;

  // The download URL for `package.js`.
  string url = 2;

  // The URL of the signature file.
  string signature_url = 3;

  // The SHA-256 hash of the `package.js` file.
  string hash = 4;

  // The function-level permission requirements for this version.
  // Behavior: Must be sorted in ascending order by `function_name` before
  // serialization.
  repeated FunctionPermissionMeta function_permissions = 5;

  // Whether this version has been yanked.
  bool yanked = 6;

  // The reason for the yank (only meaningful when `yanked` is true).
  string yank_reason = 7;
}
