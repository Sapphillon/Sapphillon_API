syntax = "proto3";

package sapphillon.arcana.v1;

import "sapphillon/arcana/v1/package_config.proto";
import "sapphillon/v1/permission.proto";

// Defines the PluginManifest schema — the runtime metadata embedded into package.js.
// At build time, the static package configuration from package.toml is merged with
// dynamic information extracted from JSDoc (function definitions, permissions, I/O
// types) to construct the final PluginManifest. The manifest is embedded into the
// bundled package.js as globalThis.__SAPPHILLON_ARCANA_META__.package.

// Represents a single input/output variable definition, analogous to JSDoc @param or @returns tags.
//
// Fields:
// - type: The data type of the variable.
// - name: The variable name of the parameter or return value.
// - description: A short description of what the variable represents.
//
// Example:
// ```proto
//   IODefinition {
//     type: "string"
//     name: "userId"
//     description: "The unique identifier of the user"
//   }
// ```
message IODefinition {
  // The data type of the variable.
  // Format: TypeScript/JavaScript type expression (e.g., "string", "number", "boolean", "object", "Array<string>").
  // Example: "string".
  string type = 1;

  // The variable name of the parameter or return value.
  // Example: "userId", "message", "options".
  string name = 2;

  // A short description of what the variable represents.
  string description = 3;
}


// Represents a single function exposed by the plugin, including JSDoc-extracted metadata such as permissions, parameters, and return values.
//
// Fields:
// - name: The name of the function.
// - description: A short description of what the function does and when to use it.
// - permissions: The permissions required to execute this function.
// - params: The function parameters (arguments), in declaration order.
// - returns: The function return values.
//
// Example:
// ```proto
//   FunctionDefinition {
//     name: "sendNotification"
//     description: "Sends a message to a configured channel"
//     permissions: [{ /* Permission */ }]
//     params: [{ io_definition: { type: "string", name: "channelId", description: "Target channel" } }]
//     returns: [{ io_definition: { type: "boolean", name: "success", description: "True if sent" } }]
//   }
// ```
message FunctionDefinition {
  // The name of the function.
  // Behavior: Required. Must be unique within the plugin package. Used as the stable identifier for invoking the function at runtime.
  // Example: "sendNotification".
  string name = 1;

  // A short description of what the function does and when to use it.
  string description = 2;

  // The permissions required to execute this function.
  // Behavior: Extracted from JSDoc @permission tags at build time. Must match the permission whitelist (FileSystemRead, FileSystemWrite, Net, Run, Env).
  // Validated during static analysis (sapphillon-cli check).
  repeated sapphillon.v1.Permission permissions = 3;

  // The function parameters (arguments), in declaration order.
  // Behavior: Extracted from JSDoc @param tags.
  repeated IODefinition params = 4;

  // The function return values.
  // Behavior: Extracted from JSDoc @returns tags. May be empty for void functions.
  repeated IODefinition returns = 5;
}

// The complete runtime metadata embedded into package.js at build time. Combines the static PackageConfig from package.toml with dynamic FunctionDefinitions extracted from JSDoc.
//
// The manifest is embedded into the bundled output as globalThis.__SAPPHILLON_ARCANA_META__.package.
// During package verification, the client MUST confirm that the metadata embedded here matches the repository index (e.g., permission lists) exactly; any mismatch aborts the installation.
//
// Fields:
// - package_config: The static package configuration sourced from package.toml.
// - functions: The functions exposed by this plugin.
//
// Example:
// ```proto
//   PluginManifest {
//     package_config: { id: "my-plugin", name: "My Plugin", version: "1.0.0", ... }
//     functions: [{ name: "sendNotification", ... }]
//   }
// ```
message PluginManifest {
  // The static package configuration sourced from package.toml.
  // See PackageConfig.
  PackageConfig package_config = 1;

  // The functions exposed by this plugin.
  // Behavior: Extracted from JSDoc at build time and merged with the static configuration to form the complete manifest.
  repeated FunctionDefinition functions = 2;
}