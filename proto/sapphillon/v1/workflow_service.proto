syntax = "proto3";

package sapphillon.v1;

import "google/protobuf/field_mask.proto";
import "google/rpc/status.proto";
import "sapphillon/v1/workflow.proto";

// Generates and fixes structured workflow definitions from natural language descriptions.
// Methods stream partial outputs to allow progressive rendering in UIs and long-running processing.
service WorkflowService {
  // Generates a workflow from a natural language prompt.
  //
  // Behavior:
  // - Server-streaming RPC that emits partial or incremental workflow definitions.
  // - The client should read until the stream completes to obtain the final definition.
  //
  // Responses:
  // - Each message may represent a partial draft or an updated full definition.
  //
  // Errors:
  // - INVALID_ARGUMENT if the prompt is empty or malformed.
  // - INTERNAL for unexpected generation errors.
  rpc GenerateWorkflow(GenerateWorkflowRequest) returns (stream GenerateWorkflowResponse);

  // Fixes an existing workflow definition using a description of issues.
  //
  // Behavior:
  // - Server-streaming RPC that emits suggested fixes and updated definitions incrementally.
  // - The final message in the stream typically represents the fully fixed definition.
  //
  // Errors:
  // - INVALID_ARGUMENT if workflow_definition or description is empty.
  // - FAILED_PRECONDITION if the definition cannot be parsed.
  // - INTERNAL for unexpected processing errors.
  rpc FixWorkflow(FixWorkflowRequest) returns (stream FixWorkflowResponse);

  // Runs a workflow based on the provided definition.
  rpc RunWorkflow(RunWorkflowRequest) returns (RunWorkflowResponse);

  // Retrieves a workflow by its ID.
  //
  // Behavior:
  // - Returns the full workflow definition for the specified ID.
  //
  // Errors:
  // - NOT_FOUND if the requested workflow does not exist.
  // - INVALID_ARGUMENT if the workflow_id is empty or malformed.
  rpc GetWorkflow(GetWorkflowRequest) returns (GetWorkflowResponse);

  // Lists workflows matching optional filters.
  //
  // Behavior:
  // - Returns a paginated list of workflows.
  // - Supports filtering by display_name and workflow_language.
  // - Supports sorting by configurable order-by clauses.
  //
  // Errors:
  // - INVALID_ARGUMENT if the page_token is invalid or the filter is malformed.
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);

  // Updates an existing workflow.
  //
  // Behavior:
  // - Only fields specified in the update_mask will be modified.
  // - If update_mask is not provided, all fields will be updated.
  //
  // Errors:
  // - NOT_FOUND if the workflow does not exist.
  // - INVALID_ARGUMENT if the workflow is malformed or the update_mask contains invalid paths.
  rpc UpdateWorkflow(UpdateWorkflowRequest) returns (UpdateWorkflowResponse);

  // Deletes a workflow by its ID.
  //
  // Behavior:
  // - Permanently removes the workflow and all associated resources.
  //
  // Errors:
  // - NOT_FOUND if the workflow does not exist.
  // - INVALID_ARGUMENT if the workflow_id is empty or malformed.
  rpc DeleteWorkflow(DeleteWorkflowRequest) returns (DeleteWorkflowResponse);
}

// Request to generate a workflow from a natural language prompt.
message GenerateWorkflowRequest {
  // Natural language prompt describing the desired workflow.
  // Example: "Check the weather, and if it's raining, send me a notification."
  // Behavior: Required; must be non-empty.
  string prompt = 1;

  // The name of the model to use for generation.
  // Format: "models/{model_id}"
  // Behavior: Optional; if not specified, the default model will be used.
  string model_name = 2;
}

// Server-streamed response containing the generated workflow definition.
// Each streamed message may be partial; the client should merge or replace as appropriate.
message GenerateWorkflowResponse {
  // Structured workflow definition.
  sapphillon.v1.Workflow workflow_definition = 1;

  // The status of the response.
  // If the status is not OK, it indicates an error.
  google.rpc.Status status = 2;
}

// Request to fix a workflow definition using a problem description.
message FixWorkflowRequest {
  // The workflow definition to be fixed.
  // Format: JSON, YAML, or another structured text representation.
  // Behavior: Required; must be parseable by the service.
  string workflow_definition = 1;

  // Description of issues to fix or constraints to apply.
  // Example: "Step IDs must be unique; add retry to notification step."
  // Behavior: Required; must be non-empty.
  string description = 2;
}

// Server-streamed response carrying fixed workflow definitions and a change summary.
// The final message typically represents the complete fixed definition.
message FixWorkflowResponse {
  // The fixed workflow definition.
  sapphillon.v1.Workflow fixed_workflow_definition = 1;

  // Summary of changes applied to produce the fixed definition.
  // Example: "Renamed duplicate step IDs; added retry policy to 'notify'."
  string change_summary = 2;

  // The status of the response.
  // If the status is not OK, it indicates an error.
  google.rpc.Status status = 3;
}

// Request to run a workflow by ID.
message RunWorkflowRequest {
  // Run a workflow by its ID and code ID.
  WorkflowSourceById by_id = 1;

  reserved 2;
  reserved "workflow_definition";

  // Optional AI model name to use for this run.
  // If not specified, the default model will be used.
  // The name should match a model from `sapphillon.ai.v1.Models.name`.
  optional string ai_model_name = 3;
}

// Specifies a workflow to run using its ID and code ID.
message WorkflowSourceById {
  // The ID of the workflow to run.
  string workflow_id = 1;
  // The ID of the workflow code to run.
  string workflow_code_id = 2;
}

// Response after running a workflow.
// Contains the result of the workflow execution and status.
message RunWorkflowResponse {
  // The result of the workflow execution.
  sapphillon.v1.WorkflowResult workflow_result = 1;

  // The status of the response.
  // If the status is not OK, it indicates an error.
  google.rpc.Status status = 2;
}

// Request message for retrieving a workflow by its ID.
message GetWorkflowRequest {
  // The ID of the workflow to retrieve.
  string workflow_id = 1;
}

// Response message for retrieving a workflow.
message GetWorkflowResponse {
  // The requested workflow definition.
  Workflow workflow = 1;

  // The status of the response.
  // If the status is not OK, it indicates an error.
  google.rpc.Status status = 2;
}

// Filter criteria for listing workflows.
message ListWorkflowsFilter {
  // Filters workflows by display name. Supports exact and partial matching.
  string display_name = 1;

  // Filters workflows by language.
  sapphillon.v1.WorkflowLanguage workflow_language = 2;
}

// Sort direction.
enum OrderByDirection {
  // Default value. Do not use.
  ORDER_BY_DIRECTION_UNSPECIFIED = 0;
  // Ascending.
  ORDER_BY_DIRECTION_ASC = 1;
  // Descending.
  ORDER_BY_DIRECTION_DESC = 2;
}

// Order by clause.
message OrderByClause {
  // Field name to order by (e.g. "display_name", "updated_at").
  string field = 1;

  // The direction to order by.
  OrderByDirection direction = 2;
}

// Request message for listing workflows.
message ListWorkflowsRequest {
  // The maximum number of workflows to return. The service may return fewer
  // than this value. If zero, the server will pick an appropriate default.
  int32 page_size = 1;

  // A page token, received from a previous `ListWorkflows` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 2;

  // Filter criteria for the listed workflows.
  ListWorkflowsFilter filter = 3;

  // Ordering clauses for the listed workflows.
  repeated OrderByClause order_by = 4;
}

// Response message for listing workflows.
message ListWorkflowsResponse {
  // The matching workflows.
  repeated Workflow workflows = 1;

  // A token to retrieve the next page of results. If this field is empty,
  // there are no more results.
  string next_page_token = 2;

  // The status of the response.
  // If the status is not OK, it indicates an error.
  google.rpc.Status status = 3;
}

// Request message for updating a workflow.
message UpdateWorkflowRequest {
  // The workflow to update.
  // The workflow's ID and name fields must identify an existing resource.
  Workflow workflow = 1;

  // The set of field paths to update.
  // If omitted, all mutable fields will be updated.
  google.protobuf.FieldMask update_mask = 2;
}

// Response message for updating a workflow.
message UpdateWorkflowResponse {
  // The updated workflow definition.
  Workflow workflow = 1;

  // The status of the response.
  // If the status is not OK, it indicates an error.
  google.rpc.Status status = 2;
}

// Request message for deleting a workflow.
message DeleteWorkflowRequest {
  // The ID of the workflow to delete.
  string workflow_id = 1;
}

// Response message for deleting a workflow.
// Intentionally empty to allow future extensibility.
message DeleteWorkflowResponse {}
